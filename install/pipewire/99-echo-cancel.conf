# PipeWire software echo cancellation
#
# Suppresses speaker output from being picked up by the microphone —
# the main cause of feedback loops when the Bluetooth device falls back
# from HFP/HSP (which has hardware EC) to a built-in mic.
#
# Creates virtual source/sink devices that PipeWire routes as the
# default; existing device routing is handled by WirePlumber and
# is not affected.
#
# library.name defaults to aec/libspa-aec-webrtc — no args needed.

context.modules = [
  { name = libpipewire-module-echo-cancel }
]
